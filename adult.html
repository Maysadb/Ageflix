<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ageflix</title>

<style>
* { box-sizing: border-box; margin:0; padding:0; font-family: Arial; }
body { background:#111; color:#fff; }

/* Navbar */
nav {
  display:flex;
  justify-content:space-between;
  padding:15px 20px;
  background:#000;
}
.logo { color:red; font-size:22px; font-weight:bold; }

/* Movies */
.movies-container {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}

.movie-card {
  cursor:pointer;
  transition:0.3s;
}
.movie-card img {
  width:100%;
  height:300px;
  object-fit:cover;
  border-radius:10px;
}
.movie-card:hover { transform:scale(1.05); }

/* Popup */
#movie-popup {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-content {
  background:#111;
  border:2px solid red;
  border-radius:15px;
  padding:20px;
  width:90%;
  max-width:600px;
  text-align:center;
  position:relative;
}

.popup-content img {
  width:100%;
  height:250px;
  object-fit:cover;
  border-radius:10px;
}

#popup-trailer {
  width:100%;
  height:280px;
  margin-top:15px;
}

.close-btn {
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  color:#fff;
  border:none;
  padding:5px 10px;
  cursor:pointer;
}
</style>

</head>

<body>

<nav>
  <div class="logo">Ageflix</div>
</nav>

<!-- Movies -->
<section class="movies-container">

  <div class="movie-card"
    data-title="Inside Out"
    data-summary="A girl’s emotions guide her through life changes."
    data-actors="Amy Poehler"
    data-img="https://upload.wikimedia.org/wikipedia/en/0/0a/Inside_Out_%282015_film%29_poster.jpg"
    data-trailer="https://www.youtube.com/embed/yRUAzGQ3nSY">
    <img src="https://upload.wikimedia.org/wikipedia/en/0/0a/Inside_Out_%282015_film%29_poster.jpg">
  </div>

  <div class="movie-card"
    data-title="WALL-E"
    data-summary="A lonely robot finds love."
    data-actors="Ben Burtt"
    data-img="https://upload.wikimedia.org/wikipedia/en/c/c2/WALL-Eposter.jpg"
    data-trailer="https://www.youtube.com/embed/alIq_wG9FNk">
    <img src="https://upload.wikimedia.org/wikipedia/en/c/c2/WALL-Eposter.jpg">
  </div>

  <div class="movie-card"
    data-title="Soul"
    data-summary="A musician discovers life meaning."
    data-actors="Jamie Foxx"
    data-img="https://upload.wikimedia.org/wikipedia/en/9/96/Soul_Poster.jpeg"
    data-trailer="https://www.youtube.com/embed/xOsLIiBStEs">
    <img src="https://upload.wikimedia.org/wikipedia/en/9/96/Soul_Poster.jpeg">
  </div>

  <div class="movie-card"
    data-title="Spider-Man"
    data-summary="A young hero saves the city."
    data-actors="Tom Holland"
    data-img="https://upload.wikimedia.org/wikipedia/en/f/f9/Spider-Man_Homecoming_poster.jpg"
    data-trailer="https://www.youtube.com/embed/rk-dF1lIbIg">
    <img src="https://upload.wikimedia.org/wikipedia/en/f/f9/Spider-Man_Homecoming_poster.jpg">
  </div>

  <div class="movie-card"
    data-title="Up"
    data-summary="An old man flies his house."
    data-actors="Ed Asner"
    data-img="https://upload.wikimedia.org/wikipedia/en/0/05/Up_%282009_film%29.jpg"
    data-trailer="https://www.youtube.com/embed/HWEW_qTLSEE">
    <img src="https://upload.wikimedia.org/wikipedia/en/0/05/Up_%282009_film%29.jpg">
  </div>

</section>

<!-- Popup -->
<div id="movie-popup">
  <div class="popup-content">

    <button class="close-btn">X</button>

    <img id="popup-img">
    <h2 id="popup-title"></h2>
    <p id="popup-summary"></p>
    <p id="popup-actors"></p>

    <iframe id="popup-trailer" allowfullscreen></iframe>

  </div>
</div>

<script>
const cards = document.querySelectorAll('.movie-card');
const popup = document.getElementById('movie-popup');

const img = document.getElementById('popup-img');
const title = document.getElementById('popup-title');
const summary = document.getElementById('popup-summary');
const actors = document.getElementById('popup-actors');
const trailer = document.getElementById('popup-trailer');

const closeBtn = document.querySelector('.close-btn');

cards.forEach(card => {
  card.onclick = () => {
    img.src = card.dataset.img;
    title.innerText = card.dataset.title;
    summary.innerText = card.dataset.summary;
    actors.innerText = "Actors: " + card.dataset.actors;
    trailer.src = card.dataset.trailer + "?autoplay=1";

    popup.style.display = "flex";
  }
});

closeBtn.onclick = () => {
  popup.style.display = "none";
  trailer.src = "";
};

popup.onclick = (e) => {
  if(e.target === popup){
    popup.style.display = "none";
    trailer.src = "";
  }
};
</script>

</body>
</html>
