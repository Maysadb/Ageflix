<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ageflix - Senior Movies</title>

<style>
* { box-sizing: border-box; margin:0; padding:0; font-family: Arial, sans-serif; }
body { background:#111; color:#fff; overflow-x: hidden; }

/* Navbar */
.navbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
  background:#111;
  border-bottom: 1px solid #222;
}
.logo { color:red; font-size:24px; font-weight:bold; text-transform: uppercase; letter-spacing: 2px; }
.navbar ul {
  display:flex;
  list-style:none;
}
.navbar ul li {
  margin:0 15px;
}
.navbar ul li a {
  color:#fff;
  text-decoration:none;
  font-size: 14px;
  transition: 0.3s;
}
.navbar ul li a:hover { color: red; }

/* Hero Section */
.page-intro {
  position:relative;
  height:60vh;
  width: 100%;
}
.page-intro video {
  width:100%;
  height:100%;
  object-fit:cover;
}
.page-intro-content {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  width: 100%;
  background: rgba(0,0,0,0.4);
  padding: 20px;
}
.page-intro h1 { color:red; font-size:50px; margin-bottom: 10px; }
.page-intro p { font-size: 18px; letter-spacing: 1px; }

/* Movies Container */
.movies-container {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
  gap:25px;
  padding:40px 20px;
  max-width: 1200px;
  margin: 0 auto;
}

/* Movie Card */
.movie-card {
  cursor:pointer;
  transition: transform 0.3s ease;
  background: #1a1a1a;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid #333;
}
.movie-card:hover { 
    transform:scale(1.05); 
    border-color: red;
}

/* حل مشكلة ظهور الصور كاملة */
.movie-card img {
  width:100%;
  height:320px; /* ارتفاع ثابت للبطاقات لتوحيد المظهر */
  object-fit: contain; /* يضمن ظهور الصورة كاملة دون قص */
  background: #000; /* خلفية سوداء للفراغات إذا كانت الصورة بنسب مختلفة */
  display: block;
}

/* Popup Styles */
#movie-popup {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  z-index: 1000;
  padding: 20px;
}

.popup-content {
  background:#111;
  border:1px solid red;
  border-radius:15px;
  padding:30px;
  width:100%;
  max-width:700px;
  text-align:center;
  position:relative;
  max-height: 90vh;
  overflow-y: auto;
}

.popup-content img {
  width: auto;
  max-width: 100%;
  height: 250px;
  object-fit: contain; /* تظهر كاملة في النافذة المنبثقة أيضاً */
  margin-bottom: 15px;
  border-radius: 8px;
}

.popup-content h2 { color: red; margin: 10px 0; }
.popup-content p { color: #ccc; line-height: 1.6; margin-bottom: 10px; }

#popup-trailer {
  width:100%;
  height:350px;
  margin-top:20px;
  border: none;
  border-radius: 10px;
}

.close-btn {
  position:absolute;
  top:15px;
  right:15px;
  background:red;
  color:#fff;
  border:none;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  cursor:pointer;
  font-weight: bold;
  z-index: 10;
}
</style>

</head>

<body>

<nav class="navbar">
  <div class="logo">Ageflix</div>
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
  <img src="logo.png" alt="Logo" style="width:50px; height:auto;">
</nav>

<section class="page-intro">
  <video autoplay muted loop playsinline>
    <source src="https://cdn.coverr.co/videos/coverr-cinema-room-4635/1080p.mp4" type="video/mp4">
  </video>
  <div class="page-intro-content">
    <h1>Senior Movies</h1>
    <p>Enjoy the best cinematic experience</p>
  </div>
</section>

<section class="movies-container">

  <div class="movie-card"
       data-title="Muhammad: The Last Prophet"
       data-summary="Animated movie depicting the life of Prophet Muhammad (PBUH)."
       data-actors="Various voice actors"
       data-img="mo.jpg"
       data-trailer="https://www.youtube.com/embed/1CmNlZXo0fI">
    <img src="mo.jpg" alt="Muhammad: The Last Prophet">
  </div>

  <div class="movie-card"
       data-title="Journey to Mecca"
       data-summary="The inspiring story of Ibn Battuta's pilgrimage to Mecca."
       data-actors="Narrated by Ben Kingsley"
       data-img="j.jpg"
       data-trailer="https://www.youtube.com/embed/3P6NY2wqzD0">
    <img src="j.jpg" alt="Journey to Mecca">
  </div>

  <div class="movie-card"
       data-title="Bilal: A New Breed of Hero"
       data-summary="Animated story about Bilal Ibn Rabah, a hero of early Islamic history."
       data-actors="Khalid Abdalla"
       data-img="bil.jpg"
       data-trailer="https://www.youtube.com/embed/VhrZBHwOMUs">
    <img src="bil.jpg" alt="Bilal: A New Breed of Hero">
  </div>

  <div class="movie-card"
       data-title="The Boy and the King"
       data-summary="An animated story exploring faith, courage, and wisdom."
       data-actors="Voice cast unknown"
       data-img="th.jpg"
       data-trailer="https://www.youtube.com/embed/TZQZ-J4fl1s">
    <img src="th.jpg" alt="The Boy and the King">
  </div>

</section>

<div id="movie-popup">
  <div class="popup-content">
    <button class="close-btn">X</button>
    <img id="popup-img" src="" alt="Movie Poster">
    <h2 id="popup-title"></h2>
    <p id="popup-summary"></p>
    <p id="popup-actors" style="font-weight: bold; color: #eee;"></p>
    <iframe id="popup-trailer" allowfullscreen allow="autoplay"></iframe>
  </div>
</div>

<script>
const cards = document.querySelectorAll('.movie-card');
const popup = document.getElementById('movie-popup');
const img = document.getElementById('popup-img');
const title = document.getElementById('popup-title');
const summary = document.getElementById('popup-summary');
const actors = document.getElementById('popup-actors');
const trailer = document.getElementById('popup-trailer');
const closeBtn = document.querySelector('.close-btn');

cards.forEach(card => {
  card.onclick = () => {
    // تحديث البيانات في النافذة المنبثقة
    img.src = card.dataset.img;
    title.innerText = card.dataset.title;
    summary.innerText = card.dataset.summary;
    actors.innerText = "Actors: " + card.dataset.actors;
    
    // تحويل روابط يوتيوب العادية لروابط Embed إذا لزم الأمر
    let trailerUrl = card.dataset.trailer;
    if(trailerUrl.includes("watch?v=")) {
        trailerUrl = trailerUrl.replace("watch?v=", "embed/");
    }
    trailer.src = trailerUrl + "?autoplay=1";

    popup.style.display = "flex";
    document.body.style.overflow = "hidden"; // منع التمرير عند فتح النافذة
  }
});

// إغلاق النافذة
const closePopup = () => {
  popup.style.display = "none";
  trailer.src = "";
  document.body.style.overflow = "auto";
};

closeBtn.onclick = closePopup;

popup.onclick = (e) => {
  if(e.target === popup){
    closePopup();
  }
};
</script>

</body>
</html>
