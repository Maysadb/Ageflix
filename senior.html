<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ageflix - Senior Movies</title>

<style>
* { box-sizing: border-box; margin:0; padding:0; font-family: Arial; }
body { background:#111; color:#fff; }

/* Navbar */
.navbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
  background:#111;
}
.logo { color:red; font-size:24px; font-weight:bold; }
.navbar ul {
  display:flex;
  list-style:none;
}
.navbar ul li {
  margin:0 15px;
}
.navbar ul li a {
  color:#fff;
  text-decoration:none;
}

/* Hero */
.page-intro {
  position:relative;
  height:60vh;
}
.page-intro video {
  width:100%;
  height:100%;
  object-fit:cover;
}
.page-intro-content {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}
.page-intro h1 { color:red; font-size:40px; }

/* Movies */
.movies-container {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}
.movie-card {
  cursor:pointer;
  transition:0.3s;
}
.movie-card img {
  width:100%;
  height:300px;
  object-fit:cover;
  border-radius:10px;
}
.movie-card:hover { transform:scale(1.05); }

/* Popup */
#movie-popup {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-content {
  background:#111;
  border:2px solid red;
  border-radius:15px;
  padding:20px;
  width:90%;
  max-width:600px;
  text-align:center;
  position:relative;
}

.popup-content img {
  width:100%;
  height:250px;
  object-fit:cover;
  border-radius:10px;
}

#popup-trailer {
  width:100%;
  height:280px;
  margin-top:15px;
}

.close-btn {
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  color:#fff;
  border:none;
  padding:5px 10px;
  cursor:pointer;
}
</style>

</head>

<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="logo">Ageflix</div>
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
  <img src="logo.png" style="width:50px;">
</nav>

<!-- Hero -->
<section class="movies-container">

  <div class="movie-card"
    data-title="Muhammad: The Last Prophet"
    data-summary="An epic animated movie depicting the life of Prophet Muhammad (PBUH) and the early days of Islam."
    data-actors="Nicholas Kadi, Richard Epcar"
    data-img="https://m.media-amazon.com/images/M/MV5BMjA4MDY5MTE1N15BMl5BanBnXkFtZTcwNjY3ODcyMQ@@._V1_.jpg"
    data-trailer="https://www.youtube.com/embed/v_799X0YxNo">
    <img src="https://m.media-amazon.com/images/M/MV5BMjA4MDY5MTE1N15BMl5BanBnXkFtZTcwNjY3ODcyMQ@@._V1_.jpg" alt="Muhammad: The Last Prophet">
  </div>

  <div class="movie-card"
    data-title="Journey to Mecca"
    data-summary="The incredible true story of Ibn Battuta, one of the greatest travelers in history, on his first pilgrimage to Mecca."
    data-actors="Chems-Eddine Zinoune, Ben Kingsley"
    data-img="https://m.media-amazon.com/images/M/MV5BNTcwNTI1OTQ2MF5BMl5BanBnXkFtZTcwNTI0NTM2Mg@@._V1_.jpg"
    data-trailer="https://www.youtube.com/embed/p6v6D_Y9pS8">
    <img src="https://m.media-amazon.com/images/M/MV5BNTcwNTI1OTQ2MF5BMl5BanBnXkFtZTcwNTI0NTM2Mg@@._V1_.jpg" alt="Journey to Mecca">
  </div>

  <div class="movie-card"
    data-title="Bilal: A New Breed of Hero"
    data-summary="Inspired by the true story of Bilal Ibn Rabah, a slave who finds his freedom through faith and courage."
    data-actors="Adewale Akinnuoye-Agbaje, Ian McShane"
    data-img="https://m.media-amazon.com/images/M/MV5BMjQ0MjM3NjY0M15BMl5BanBnXkFtZTgwNTU0ODU1OTE@._V1_.jpg"
    data-trailer="https://www.youtube.com/embed/XmE9pG99v7Q">
    <img src="https://m.media-amazon.com/images/M/MV5BMjQ0MjM3NjY0M15BMl5BanBnXkFtZTgwNTU0ODU1OTE@._V1_.jpg" alt="Bilal">
  </div>

  <div class="movie-card"
    data-title="The Boy and the King"
    data-summary="An inspiring story about a young boy who discovers the truth of faith in a kingdom ruled by a tyrant."
    data-actors="Educational Animation"
    data-img="https://m.media-amazon.com/images/M/MV5BMTYxMDg5NDc0Ml5BMl5BanBnXkFtZTgwODU1MzE4NDE@._V1_.jpg"
    data-trailer="https://www.youtube.com/embed/V6XN9qB_f4o">
    <img src="https://m.media-amazon.com/images/M/MV5BMTYxMDg5NDc0Ml5BMl5BanBnXkFtZTgwODU1MzE4NDE@._V1_.jpg" alt="The Boy and the King">
  </div>

</section>

<!-- Popup -->
<div id="movie-popup">
  <div class="popup-content">

    <button class="close-btn">X</button>

    <img id="popup-img">
    <h2 id="popup-title"></h2>
    <p id="popup-summary"></p>
    <p id="popup-actors"></p>

    <iframe id="popup-trailer" allowfullscreen></iframe>

  </div>
</div>

<script>
const cards = document.querySelectorAll('.movie-card');
const popup = document.getElementById('movie-popup');

const img = document.getElementById('popup-img');
const title = document.getElementById('popup-title');
const summary = document.getElementById('popup-summary');
const actors = document.getElementById('popup-actors');
const trailer = document.getElementById('popup-trailer');

const closeBtn = document.querySelector('.close-btn');

cards.forEach(card => {
  card.onclick = () => {
    img.src = card.dataset.img;
    title.innerText = card.dataset.title;
    summary.innerText = card.dataset.summary;
    actors.innerText = "Actors: " + card.dataset.actors;
    trailer.src = card.dataset.trailer + "?autoplay=1";

    popup.style.display = "flex";
  }
});

closeBtn.onclick = () => {
  popup.style.display = "none";
  trailer.src = "";
};

popup.onclick = (e) => {
  if(e.target === popup){
    popup.style.display = "none";
    trailer.src = "";
  }
};
</script>

</body>
</html>
