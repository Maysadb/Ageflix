<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ageflix - Kids Movies</title>

<style>
* { box-sizing: border-box; margin:0; padding:0; font-family: Arial; }
body { background:#111; color:#fff; }

/* Navbar */
.navbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
  background:#111;
}
.logo { color:red; font-size:24px; font-weight:bold; }
.navbar ul {
  display:flex;
  list-style:none;
}
.navbar ul li {
  margin:0 15px;
}
.navbar ul li a {
  color:#fff;
  text-decoration:none;
}

/* Hero */
.page-intro {
  position:relative;
  height:60vh;
}
.page-intro video {
  width:100%;
  height:100%;
  object-fit:cover;
}
.page-intro-content {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}
.page-intro h1 { color:red; font-size:40px; }

/* Movies */
.movies-container {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}
.movie-card {
  cursor:pointer;
  transition:0.3s;
}
.movie-card img {
  width:100%;
  height:300px;
  object-fit:cover;
  border-radius:10px;
}
.movie-card:hover { transform:scale(1.05); }

/* Popup */
#movie-popup {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-content {
  background:#111;
  border:2px solid red;
  border-radius:15px;
  padding:20px;
  width:90%;
  max-width:600px;
  text-align:center;
  position:relative;
}

.popup-content img {
  width:100%;
  height:250px;
  object-fit:cover;
  border-radius:10px;
}

#popup-trailer {
  width:100%;
  height:280px;
  margin-top:15px;
}

.close-btn {
  position:absolute;
  top:10px;
  right:10px;
  background:red;
  color:#fff;
  border:none;
  padding:5px 10px;
  cursor:pointer;
}
</style>

</head>

<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="logo">Ageflix</div>
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
  <img src="logo.png" style="width:50px;">
</nav>

<!-- Hero -->
<section class="page-intro">
  <video autoplay muted loop>
    <source src="https://cdn.coverr.co/videos/coverr-cinema-room-4635/1080p.mp4">
  </video>
  <div class="page-intro-content">
    <h1>Kids Movies</h1>
    <p>Enjoy thrilling stories, passionate adventures, and cinematic experiences made for mature audiences.</p>
  </div>
</section>

<!-- Movies -->
<section class="movies-container">

  <!-- Frozen -->
  <div class="movie-card"
    data-title="Frozen"
    data-summary="A princess sets out to save her kingdom with her sister."
    data-actors="Kristen Bell"
    data-img="1.jpg"
    data-trailer="https://www.youtube.com/embed/TbQm5doF_Uc">
    <img src="https://m.media-amazon.com/images/M/MV5BMjA0Mjc5OTYyNV5BMl5BanBnXkFtZTgwNjY5OTQ0MDE@._V1_.jpg">
  </div>

  <!-- Finding Nemo -->
  <div class="movie-card"
    data-title="Finding Nemo"
    data-summary="A father fish searches for his lost son."
    data-actors="Albert Brooks"
    data-img="2.jpg"
    data-trailer="https://www.youtube.com/embed/wZdpNglLbt8">
    <img src="https://m.media-amazon.com/images/M/MV5BMTk0NTY4ODU1Nl5BMl5BanBnXkFtZTYwNTQ2Mjk3._V1_.jpg">
  </div>

  <!-- The Lion King -->
  <div class="movie-card"
    data-title="The Lion King"
    data-summary="A young lion learns about responsibility and courage."
    data-actors="Matthew Broderick"
    data-img="3.jpg"
    data-trailer="https://www.youtube.com/embed/4sj1MT05lAA">
    <img src="https://m.media-amazon.com/images/M/MV5BMTYxNjYzNzk5OV5BMl5BanBnXkFtZTcwODAyNTkxMw@@._V1_.jpg">
  </div>

  <!-- Moana -->
  <div class="movie-card"
    data-title="Moana"
    data-summary="A brave girl sails the ocean to save her people."
    data-actors="Auli'i Cravalho"
    data-img="4.jpg"
    data-trailer="https://www.youtube.com/embed/LKFuXETZUsI">
    <img src="https://m.media-amazon.com/images/M/MV5BMTc5OTc5NjI2Nl5BMl5BanBnXkFtZTgwODk5NzE0MDI@._V1_.jpg">
  </div>

  <!-- Secret Life of Pets -->
  <div class="movie-card"
    data-title="The Secret Life of Pets"
    data-summary="Pets live secret lives when owners are away."
    data-actors="Louis C.K."
    data-img="5.jpg"
    data-trailer="https://www.youtube.com/embed/i-80SGWfEjM">
    <img src="https://m.media-amazon.com/images/M/MV5BMTU0MzE3Njc0NF5BMl5BanBnXkFtZTgwNDY5NzI1NzE@._V1_.jpg">
  </div>

</section>

<!-- Popup -->
<div id="movie-popup">
  <div class="popup-content">

    <button class="close-btn">X</button>

    <img id="popup-img">
    <h2 id="popup-title"></h2>
    <p id="popup-summary"></p>
    <p id="popup-actors"></p>

    <iframe id="popup-trailer" allowfullscreen></iframe>

  </div>
</div>

<script>
const cards = document.querySelectorAll('.movie-card');
const popup = document.getElementById('movie-popup');

const img = document.getElementById('popup-img');
const title = document.getElementById('popup-title');
const summary = document.getElementById('popup-summary');
const actors = document.getElementById('popup-actors');
const trailer = document.getElementById('popup-trailer');

const closeBtn = document.querySelector('.close-btn');

cards.forEach(card => {
  card.onclick = () => {
    img.src = card.dataset.img;
    title.innerText = card.dataset.title;
    summary.innerText = card.dataset.summary;
    actors.innerText = "Actors: " + card.dataset.actors;
    trailer.src = card.dataset.trailer + "?autoplay=1";

    popup.style.display = "flex";
  }
});

closeBtn.onclick = () => {
  popup.style.display = "none";
  trailer.src = "";
};

popup.onclick = (e) => {
  if(e.target === popup){
    popup.style.display = "none";
    trailer.src = "";
  }
};
</script>

</body>
</html>
