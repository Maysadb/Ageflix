<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ageflix -Home</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
* { box-sizing:border-box; margin:0; padding:0; font-family: 'Segoe UI'; }
body { background:#000; color:#fff; }

/* Navbar */
.navbar {
  display:flex; justify-content:space-between;
  padding:10px 40px; background:#111;
  border-bottom:2px solid #9C0F2E;
}
.logo { color:#9C0F2E; font-weight:bold; }

/* Slider */
.slider { position:relative; overflow:hidden; }
.slide { position:absolute; width:100%; opacity:0; transition:1s; }
.slide.active { opacity:1; }

.slide img {
  width:100%;
  height:auto;
  object-fit:contain;
  background:black;
}

/* Controls */
.slider-controls { text-align:center; margin-top:10px; }
button { background:#9C0F2E; color:#fff; padding:10px; border:none; cursor:pointer; }

/* Marquee */
.marquee-container {
  overflow:hidden;
  white-space:nowrap;
  background:#111;
  padding:20px 0;
}

.marquee-content {
  display:inline-block;
  animation:marquee 20s linear infinite;
}

.marquee-content img {
  width:400px;
  height:auto;
  margin:0 15px;
  border-radius:10px;
  object-fit:contain;
  background:black;
}

@keyframes marquee {
  0% { transform:translateX(0); }
  100% { transform:translateX(-50%); }
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
  <div class="logo">AGEFLIX</div>
  <img src="logo.png" width="50">
</div>

<!-- Slider -->
<div class="slider">
  <div class="slide active"><img src="ba1.png"></div>
  <div class="slide"><img src="ba2.png"></div>
  <div class="slide"><img src="ba3.png"></div>
  <div class="slide"><img src="bann.PNG"></div>
</div>

<div class="slider-controls">
  <button onclick="changeSlide(-1)">❮</button>
  <button onclick="changeSlide(1)">❯</button>
</div>

<!-- Button -->
<button onclick="start()">Start Camera</button>

<!-- Marquee -->
<div class="marquee-container">
  <div class="marquee-content">
    <img src="t1.JPG">
    <img src="t2.JPG">
    <img src="t3.JPG">
    <img src="13.jpeg">
    <img src="14.jpeg">
  </div>
</div>

<script>
// Slider
let slides = document.querySelectorAll(".slide");
let index = 0;

function showSlide(i){
  slides.forEach(s => s.classList.remove("active"));
  slides[i].classList.add("active");
}

function changeSlide(n){
  index += n;
  if(index >= slides.length) index = 0;
  if(index < 0) index = slides.length-1;
  showSlide(index);
}

setInterval(() => changeSlide(1), 4000);
</script>

</body>
</html>
