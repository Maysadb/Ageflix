<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ageflix - About</title>
<style>
  * { box-sizing: border-box; margin:0; padding:0; font-family: Arial, sans-serif; }
  body { background: #111; color: #fff; overflow-x: hidden; }

  /* Navbar */
  nav.navbar { display: flex; align-items: center; justify-content: space-between; background-color: #111; color: #fff; padding: 10px 20px; flex-wrap: wrap; }
  .navbar .logo { font-size: 24px; font-weight: bold; flex: 1; color: #9C0F2E; }
  .navbar ul { display: flex; list-style: none; justify-content: center; flex:2; }
  .navbar ul li { margin: 0 15px; }
  .navbar ul li a { color:#fff; text-decoration: none; font-weight: bold; }

  /* About Section */
  section.about { padding: 40px 20px; text-align: center; }
  section.about h1 { font-size: 32px; margin-bottom: 20px; color: #9C0F2E; }
  section.about p { font-size: 18px; max-width: 800px; margin: 0 auto 30px; line-height: 1.6; }
  h2 { color: #9C0F2E; margin-bottom:20px; }

  /* Carousel */
  .carousel-container { position: relative; width: 100%; overflow: hidden; padding: 40px 0; }
  .carousel-track { display: flex; gap: 30px; transition: transform 0.3s; }
  .carousel-card { min-width: 300px; max-width: 300px; height: 300px; border-radius: 15px; overflow: hidden; position: relative; cursor: pointer; box-shadow: 0 8px 25px rgba(0,0,0,0.6); }
  .carousel-card img { width: 100%; height: 100%; object-fit: cover; }

  /* Navigation Arrows */
  .carousel-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 35px;
    height: 35px;
    background: rgba(156,15,46,0.7);
    border-radius: 50%;
    color: #fff;
    font-size: 24px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    z-index: 1000;
    transition: transform 0.3s, background 0.3s;
    user-select: none;
  }
  .carousel-arrow:hover { transform: translateY(-50%) scale(1.2); background: rgba(156,15,46,1); }
  .carousel-arrow.left { left: 10px; }
  .carousel-arrow.right { right: 10px; }

  /* Popup Zoom */
  #popupZoom {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 2000;
  }
  #popupZoom img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 15px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.8);
  }
  #popupZoom .closeBtn {
    position: absolute;
    top:20px;
    right:20px;
    font-size: 28px;
    color: #fff;
    cursor: pointer;
    background: rgba(156,15,46,0.7);
    border-radius: 50%;
    width: 40px; height: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  #popupZoom .closeBtn:hover { background: rgba(156,15,46,1); transform: scale(1.2); }

  @media(max-width:1200px){ .carousel-card { min-width: 250px; max-width: 250px; height: 250px; } }
  @media(max-width:768px){ .carousel-card { min-width: 200px; max-width: 200px; height: 200px; } section.about h1 { font-size: 24px; } section.about p { font-size: 16px; }
</style>
</head>
<body>

<nav class="navbar">
  <div class="logo">Ageflix</div>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <img src="logo.png" alt="Logo" style="width: 50px; height: 50px;">
</nav>

<section class="about">
  <h1>About Ageflix Project</h1>
  <p>
    We are Grade 6A students—Ellen Alsahoree, Fawziah Almogherah, and Rouz Ahmed—developing AGEFLIX inspired by Netflix-style recommendations.
  </p>
  <h2>Meet the Team</h2>

  <div class="carousel-container" id="carouselContainer">
    <div class="carousel-track" id="carouselTrack">
      <div class="carousel-card"><img src="https://picsum.photos/300/300?random=11"></div>
      <div class="carousel-card"><img src="https://picsum.photos/300/300?random=12"></div>
      <div class="carousel-card"><img src="https://picsum.photos/300/300?random=13"></div>
      <div class="carousel-card"><img src="https://picsum.photos/300/300?random=14"></div>
      <div class="carousel-card"><img src="https://picsum.photos/300/300?random=15"></div>
    </div>

    <!-- الأسهم -->
    <div class="carousel-arrow left" id="arrowLeft">&#10094;</div>
    <div class="carousel-arrow right" id="arrowRight">&#10095;</div>
  </div>
</section>

<!-- Popup Zoom -->
<div id="popupZoom">
  <span class="closeBtn">&times;</span>
  <img src="" alt="Zoomed Image">
</div>

<script>
const track = document.getElementById('carouselTrack');
const container = document.getElementById('carouselContainer');
const cards = Array.from(track.children);

let speed = 0.08;
let offset = 0;

// نسخ العناصر لتكرار سلس
track.innerHTML += track.innerHTML;
const allCards = Array.from(track.children);

function animateCarousel(){
  offset -= speed;
  if(Math.abs(offset) >= track.scrollWidth/2){ offset = 0; }
  track.style.transform = `translateX(${offset}px)`;
  requestAnimationFrame(animateCarousel);
}

// توقف عند hover
container.addEventListener('mouseenter', ()=> speed=0);
container.addEventListener('mouseleave', ()=> speed=0.08);

// أسهم التنقل
document.getElementById('arrowLeft').addEventListener('click', ()=> offset += 310);
document.getElementById('arrowRight').addEventListener('click', ()=> offset -= 310);

// Zoom عند الضغط على الصورة
const popup = document.getElementById('popupZoom');
const popupImg = popup.querySelector('img');
const closeBtn = popup.querySelector('.closeBtn');

cards.forEach(card=>{
  card.addEventListener('click', ()=>{
    popup.style.display = 'flex';
    popupImg.src = card.querySelector('img').src;
  });
});

closeBtn.addEventListener('click', ()=>{
  popup.style.display = 'none';
  popupImg.src = '';
});

popup.addEventListener('click', e=>{
  if(e.target === popup) { popup.style.display = 'none'; popupImg.src = ''; }
});

animateCarousel();
</script>

</body>
</html>
