<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ageflix - About</title>
<style>
  * { box-sizing: border-box; margin:0; padding:0; font-family: Arial, sans-serif; }
  body { background: #111; color: #fff; overflow-x: hidden; }

  /* Navbar */
  nav.navbar { display: flex; align-items: center; justify-content: space-between; background-color: #111; color: #fff; padding: 10px 20px; flex-wrap: wrap; }
  .navbar .logo { font-size: 24px; font-weight: bold; flex: 1; color: #9C0F2E; }
  .navbar ul { display: flex; list-style: none; justify-content: center; flex:2; }
  .navbar ul li { margin: 0 15px; }
  .navbar ul li a { color:#fff; text-decoration: none; font-weight: bold; }

  /* About Section */
  section.about { padding: 40px 20px; text-align: center; }
  section.about h1 { font-size: 32px; margin-bottom: 20px; color: #9C0F2E; }
  section.about p { font-size: 18px; max-width: 800px; margin: 0 auto 30px; line-height: 1.6; }
  h2 { color: #9C0F2E; margin-bottom:20px; }

  /* Carousel */
  .carousel-container { position: relative; width: 100%; overflow: hidden; padding: 40px 0; perspective: 1000px; }
  .carousel-track { display: flex; gap: 30px; transition: transform 0.3s; }
  .carousel-card { min-width: 250px; max-width: 250px; height: 250px; border-radius: 15px; overflow: hidden; position: relative; cursor: pointer; transition: transform 0.3s, z-index 0.3s; box-shadow: 0 8px 25px rgba(0,0,0,0.6); }
  .carousel-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }

  /* Navigation Arrows */
  .carousel-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 50px;
    height: 50px;
    background: rgba(156,15,46,0.7); /* #9C0F2E مع شفافية */
    border-radius: 50%;
    color: #fff;
    font-size: 30px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    z-index: 1000;
    transition: transform 0.3s, background 0.3s;
    user-select: none;
  }
  .carousel-arrow:hover { transform: translateY(-50%) scale(1.2); background: rgba(156,15,46,1); }
  .carousel-arrow.left { left: 10px; }
  .carousel-arrow.right { right: 10px; }

  @media(max-width:1200px){ .carousel-card { min-width: 220px; max-width: 220px; height: 220px; } }
  @media(max-width:768px){ .carousel-card { min-width: 180px; max-width: 180px; height: 180px; } section.about h1 { font-size: 24px; } section.about p { font-size: 16px; }
</style>
</head>
<body>

<nav class="navbar">
  <div class="logo">Ageflix</div>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <img src="logo.png" alt="Logo" style="width: 50px; height: 50px;">
</nav>

<section class="about">
  <h1>About Ageflix Project</h1>
  <p>
    We are Grade 6A students—Ellen Alsahoree, Fawziah Almogherah, and Rouz Ahmed—developing AGEFLIX inspired by Netflix-style recommendations.
  </p>
  <h2>Meet the Team</h2>

  <div class="carousel-container" id="carouselContainer">
    <div class="carousel-track" id="carouselTrack">
      <div class="carousel-card"><img src="https://picsum.photos/250/250?random=11"></div>
      <div class="carousel-card"><img src="https://picsum.photos/250/250?random=12"></div>
      <div class="carousel-card"><img src="https://picsum.photos/250/250?random=13"></div>
      <div class="carousel-card"><img src="https://picsum.photos/250/250?random=14"></div>
      <div class="carousel-card"><img src="https://picsum.photos/250/250?random=15"></div>
    </div>

    <!-- الأسهم -->
    <div class="carousel-arrow left" id="arrowLeft">&#10094;</div>
    <div class="carousel-arrow right" id="arrowRight">&#10095;</div>
  </div>
</section>

<script>
const track = document.getElementById('carouselTrack');
const container = document.getElementById('carouselContainer');
const cards = Array.from(track.children);

let speed = 0.08; // سرعة الحركة
let offset = 0;

// نسخ العناصر لتكرار سلس
track.innerHTML += track.innerHTML;
const allCards = Array.from(track.children);

function animateCarousel(){
  offset -= speed;
  if(Math.abs(offset) >= track.scrollWidth/2){
    offset = 0;
  }
  track.style.transform = `translateX(${offset}px)`;

  // Zoom على الصورة الوسطية
  const center = container.offsetWidth/2;
  allCards.forEach(card=>{
    const cardCenter = card.offsetLeft + card.offsetWidth/2 - offset;
    const distance = Math.abs(center - cardCenter);
    const scale = Math.max(0.7, 1 - distance/1000);
    card.style.transform = `scale(${scale})`;
    card.style.zIndex = Math.floor(scale*100);
  });

  requestAnimationFrame(animateCarousel);
}

// توقف عند hover
container.addEventListener('mouseenter', ()=> speed=0);
container.addEventListener('mouseleave', ()=> speed=0.08);

// أسهم التنقل
document.getElementById('arrowLeft').addEventListener('click', ()=> offset += 260); // تحريك يمين
document.getElementById('arrowRight').addEventListener('click', ()=> offset -= 260); // تحريك يسار

animateCarousel();
</script>

</body>
</html>
